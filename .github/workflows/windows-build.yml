name: Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - pure-local-windows

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows artifact
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Go setup
        uses: actions/setup-go@v5
        with:
          go-version-file: sidecars/cockpit-cliproxy/go.mod
          cache-dependency-path: sidecars/cockpit-cliproxy/go.sum

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build Windows Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          args: "--ci --config src-tauri/tauri.ci.conf.json"

      - name: Collect Windows installers
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $artifactDir = Join-Path $PWD 'release-artifacts'
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          $candidatePatterns = @(
            'target/release/bundle/nsis/*.exe',
            'target/release/bundle/msi/*.msi',
            'target/release/*.exe',
            'target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe',
            'target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi',
            'target/x86_64-pc-windows-msvc/release/*.exe',
            'src-tauri/target/release/bundle/nsis/*.exe',
            'src-tauri/target/release/bundle/msi/*.msi',
            'src-tauri/target/release/*.exe',
            'src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe',
            'src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi',
            'src-tauri/target/x86_64-pc-windows-msvc/release/*.exe'
          )

          $files = @()
          foreach ($pattern in $candidatePatterns) {
            $files += Get-ChildItem -Path $pattern -File -ErrorAction SilentlyContinue
          }
          $files = $files | Sort-Object FullName -Unique

          Write-Host '=== Candidate Windows artifacts ==='
          if ($files.Count -eq 0) {
            Write-Host 'No installer or executable matched the configured artifact patterns.'
            Write-Host '=== target directories ==='
            Get-ChildItem -Path target, src-tauri/target -Directory -Recurse -ErrorAction SilentlyContinue |
              Select-Object FullName |
              Format-Table -AutoSize
            throw 'No Windows artifacts were found after the Tauri build.'
          }

          $files |
            Select-Object FullName, Length |
            Format-Table -AutoSize

          foreach ($file in $files) {
            Copy-Item -LiteralPath $file.FullName -Destination (Join-Path $artifactDir $file.Name) -Force
          }

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: cockpit-tools-windows-pure-local
          if-no-files-found: error
          path: release-artifacts/*
